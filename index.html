<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Sistema de análisis de seguridad pública de [Tu Nombre]">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE ANÁLISIS | [ANONIMOUS SEGURITY]</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --danger: #ff3e3e;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            padding: 40px;
            line-height: 1.6;
        }
        .terminal {
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--neon-green);
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.95);
        }
        h1 { font-size: 1.5rem; text-transform: uppercase; border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; }
        .secure-badge { background: var(--neon-green); color: black; padding: 2px 8px; font-weight: bold; margin-right: 10px; }
        #consola-live { white-space: pre-wrap; color: #fff; margin-top: 15px; font-size: 0.9rem; }
        .final-msg { color: var(--neon-green); font-weight: bold; text-transform: uppercase; margin-top: 10px; display: block; }
        .cursor { animation: blink 1s infinite; font-weight: bold; background: var(--neon-green); color: var(--neon-green); }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="terminal">
        <h1><span class="secure-badge">ESTADO: ACTIVO</span> ANÁLISIS DE SISTEMAS</h1>
        
        <p>> Cargando protocolos de seguridad en Linux Mint...</p>
        <p>> Usuario: Analista_Junior | Nivel: Acceso Total</p>

        <hr style="border: 0.5px solid var(--neon-green); margin-top: 20px;">
        
        <div id="consola-live"></div>
        <span id="final-box"></span><span class="cursor">_</span>
    </div>

    <script>
        const consola = document.getElementById('consola-live');
        const finalBox = document.getElementById('final-box');
        
        const lineas = [
            " > [INFO] Iniciando escaneo de red...",
            " > [OK] Verificando firewalls y puertos abiertos...",
            " > [INFO] Analizando tráfico entrante en Linux Mint...",
            " > [OK] No se detectan intrusiones externas.",
            " > [INFO] Comprobando integridad del Kernel...",
            " > [OK] Seguridad del núcleo verificada.",
            " > [INFO] Limpiando rastros de conexiones temporales..."
        ];

        const mensajeFinal = " > Protocolo de seguridad finalizada perímetro sin trakeo de información";

        let lineaIdx = 0;
        let charIdx = 0;

        function escribirLineas() {
            if (lineaIdx < lineas.length) {
                let currentLine = lineas[lineaIdx];
                if (charIdx < currentLine.length) {
                    consola.innerHTML += currentLine.charAt(charIdx);
                    charIdx++;
                    setTimeout(escribirLineas, 30);
                } else {
                    consola.innerHTML += "<br>";
                    charIdx = 0;
                    lineaIdx++;
                    setTimeout(escribirLineas, 600);
                }
            } else {
                escribirFinal();
            }
        }

        let finalCharIdx = 0;
        function escribirFinal() {
            if (finalCharIdx < mensajeFinal.length) {
                finalBox.innerHTML += mensajeFinal.charAt(finalCharIdx);
                finalBox.className = "final-msg";
                finalCharIdx++;
                setTimeout(escribirFinal, 50);
            }
        }

        window.onload = escribirLineas;
    </script>
</body>
</html>
